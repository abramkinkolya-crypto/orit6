<!DOCTYPE html>

<style>
/* === BASE.CSS — Design Tokens & Reset === */

:root {
  /* Primary palette */
  --blue-50: #edf6fc;
  --blue-100: #d0e8f7;
  --blue-200: #a1d1ef;
  --blue-300: #5db3e2;
  --blue-400: #2a92cc;
  --blue-500: #1a73a7;
  --blue-600: #155d87;
  --blue-700: #114a6c;
  --blue-800: #0d3750;
  --blue-900: #0a2539;

  /* Severity */
  --green-50: #eefbf3;
  --green-100: #d4f5e0;
  --green-500: #22a355;
  --green-600: #1b8a47;
  --green-700: #16713a;
  --yellow-50: #fefce8;
  --yellow-100: #fef3c7;
  --yellow-500: #d4a017;
  --yellow-600: #b38b14;
  --yellow-700: #8c6d10;
  --red-50: #fef2f2;
  --red-100: #fde2e2;
  --red-500: #dc2626;
  --red-600: #b91c1c;
  --red-700: #991b1b;
  --orange-50: #fff8ed;
  --orange-100: #ffeccc;
  --orange-500: #e67e22;
  --orange-600: #c96b1a;
  --orange-700: #a85614;

  /* Neutrals */
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #adb5bd;
  --gray-600: #6c757d;
  --gray-700: #495057;
  --gray-800: #343a40;
  --gray-900: #212529;

  /* Semantic tokens */
  --bg: #ffffff;
  --bg-raised: var(--gray-50);
  --bg-card: #ffffff;
  --bg-card-hover: var(--gray-50);
  --text: var(--gray-900);
  --text-secondary: var(--gray-600);
  --text-muted: var(--gray-500);
  --border: var(--gray-200);
  --border-strong: var(--gray-300);
  --accent: var(--blue-500);
  --accent-bg: var(--blue-50);
  --accent-text: var(--blue-700);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);

  /* Severity semantic */
  --severity-green-bg: var(--green-50);
  --severity-green-border: var(--green-500);
  --severity-green-text: var(--green-700);
  --severity-yellow-bg: var(--yellow-50);
  --severity-yellow-border: var(--yellow-500);
  --severity-yellow-text: var(--yellow-700);
  --severity-red-bg: var(--red-50);
  --severity-red-border: var(--red-500);
  --severity-red-text: var(--red-700);
  --severity-orange-bg: var(--orange-50);
  --severity-orange-border: var(--orange-500);
  --severity-orange-text: var(--orange-700);

  /* Typography */
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-heading: 'General Sans', 'Inter', -apple-system, sans-serif;
  --text-xs: 0.6875rem;
  --text-sm: 0.8125rem;
  --text-base: 0.875rem;
  --text-md: 1rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --lh-tight: 1.25;
  --lh-normal: 1.5;

  /* Spacing */
  --sp-1: 0.25rem;
  --sp-2: 0.5rem;
  --sp-3: 0.75rem;
  --sp-4: 1rem;
  --sp-5: 1.25rem;
  --sp-6: 1.5rem;
  --sp-8: 2rem;
  --sp-10: 2.5rem;
  --sp-12: 3rem;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  /* Layout */
  --header-height: 130px;
  --max-width: 960px;
}

/* Dark mode */
[data-theme="dark"] {
  --bg: #111827;
  --bg-raised: #1a2233;
  --bg-card: #1e293b;
  --bg-card-hover: #263044;
  --text: #e5e7eb;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border: #2d3748;
  --border-strong: #3d4a5e;
  --accent: #4da6db;
  --accent-bg: rgba(26,115,167,0.15);
  --accent-text: #7ec8f0;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);

  --severity-green-bg: rgba(34,163,85,0.12);
  --severity-green-border: var(--green-500);
  --severity-green-text: #6ee7a0;
  --severity-yellow-bg: rgba(212,160,23,0.12);
  --severity-yellow-border: var(--yellow-500);
  --severity-yellow-text: #fde68a;
  --severity-red-bg: rgba(220,38,38,0.12);
  --severity-red-border: var(--red-500);
  --severity-red-text: #fca5a5;
  --severity-orange-bg: rgba(230,126,34,0.12);
  --severity-orange-border: var(--orange-500);
  --severity-orange-text: #fdba74;
}

/* Reset */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: var(--lh-normal);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  line-height: var(--lh-tight);
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

button {
  font: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

input {
  font: inherit;
  border: none;
  background: none;
  color: inherit;
  outline: none;
}

img, svg { display: block; max-width: 100%; }

ul, ol { list-style: none; }

/* Utility */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
/* === STYLE.CSS — Component Styles === */

/* ---- Header ---- */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-3) var(--sp-4);
  max-width: var(--max-width);
  margin: 0 auto;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}

.header-logo {
  color: var(--accent);
  flex-shrink: 0;
}

.header-title {
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}

.header-subtitle {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-top: 1px;
}

.header-actions {
  display: flex;
  gap: var(--sp-2);
  align-items: center;
}

.search-toggle, .theme-toggle {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  transition: background 0.15s, color 0.15s;
}
.search-toggle:hover, .theme-toggle:hover {
  background: var(--bg-raised);
  color: var(--text);
}

.theme-toggle .icon-moon { display: none; }
[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

/* Search bar */
.search-bar {
  display: none;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-4);
  max-width: var(--max-width);
  margin: 0 auto;
  border-top: 1px solid var(--border);
}
.search-bar.open {
  display: flex;
}
.search-bar svg {
  flex-shrink: 0;
  color: var(--text-muted);
}
.search-bar input {
  flex: 1;
  padding: var(--sp-2) 0;
  font-size: var(--text-base);
}
.search-bar input::placeholder {
  color: var(--text-muted);
}
.search-clear {
  font-size: 1.25rem;
  color: var(--text-muted);
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
}
.search-clear:hover { background: var(--bg-raised); }

/* Tab navigation */
.tab-nav {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 var(--sp-4);
}

.tab-scroll {
  display: flex;
  gap: var(--sp-1);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: var(--sp-2);
  padding-top: var(--sp-2);
}
.tab-scroll::-webkit-scrollbar { display: none; }

.tab-btn {
  flex-shrink: 0;
  padding: var(--sp-2) var(--sp-3);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--text-secondary);
  border-radius: var(--radius-md);
  transition: all 0.15s;
  white-space: nowrap;
}
.tab-btn:hover {
  color: var(--text);
  background: var(--bg-raised);
}
.tab-btn.active {
  color: var(--accent);
  background: var(--accent-bg);
  font-weight: 600;
}

/* ---- Main ---- */
.app-main {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: var(--sp-4);
  min-height: calc(100vh - 200px);
}

/* ---- Cards ---- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--sp-4);
  margin-bottom: var(--sp-3);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.15s;
}
.card:hover {
  box-shadow: var(--shadow-md);
}

.card-title {
  font-size: var(--text-md);
  font-weight: 600;
  margin-bottom: var(--sp-3);
  color: var(--text);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.card-section {
  margin-bottom: var(--sp-3);
}
.card-section:last-child { margin-bottom: 0; }

.card-section-title {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: var(--sp-2);
}

/* Drug items */
.drug-item {
  padding: var(--sp-2) 0;
  border-bottom: 1px solid var(--border);
  font-size: var(--text-base);
  line-height: 1.55;
}
.drug-item:last-child { border-bottom: none; }

.drug-name {
  font-weight: 700;
  color: var(--text);
}

.drug-dose {
  color: var(--accent-text);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.drug-route {
  display: inline-block;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-secondary);
  background: var(--bg-raised);
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: var(--sp-1);
  vertical-align: middle;
}

.drug-or {
  display: block;
  font-size: var(--text-xs);
  color: var(--text-muted);
  padding: var(--sp-1) 0;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ---- Badges ---- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: var(--text-xs);
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
  white-space: nowrap;
  line-height: 1.4;
}

.badge-green {
  background: var(--severity-green-bg);
  color: var(--severity-green-text);
  border: 1px solid var(--severity-green-border);
}
.badge-yellow {
  background: var(--severity-yellow-bg);
  color: var(--severity-yellow-text);
  border: 1px solid var(--severity-yellow-border);
}
.badge-red {
  background: var(--severity-red-bg);
  color: var(--severity-red-text);
  border: 1px solid var(--severity-red-border);
}
.badge-orange {
  background: var(--severity-orange-bg);
  color: var(--severity-orange-text);
  border: 1px solid var(--severity-orange-border);
}
.badge-blue {
  background: var(--accent-bg);
  color: var(--accent-text);
  border: 1px solid var(--accent);
}

/* Severity left-border cards */
.severity-card {
  border-left: 4px solid;
  padding-left: var(--sp-4);
}
.severity-green { border-left-color: var(--severity-green-border); }
.severity-yellow { border-left-color: var(--severity-yellow-border); }
.severity-red { border-left-color: var(--severity-red-border); }
.severity-orange { border-left-color: var(--severity-orange-border); }

/* ---- Callout boxes ---- */
.callout {
  border-radius: var(--radius-md);
  padding: var(--sp-3) var(--sp-4);
  margin: var(--sp-3) 0;
  font-size: var(--text-sm);
  display: flex;
  gap: var(--sp-3);
  align-items: flex-start;
}

.callout-icon {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  margin-top: 1px;
}

.callout-mrsa {
  background: var(--severity-orange-bg);
  border: 1px solid var(--severity-orange-border);
  color: var(--severity-orange-text);
}

.callout-candida {
  background: var(--severity-red-bg);
  border: 1px solid var(--severity-red-border);
  color: var(--severity-red-text);
}

.callout-info {
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  color: var(--accent-text);
}

.callout .drug-name {
  color: inherit;
}

/* ---- Stratification table ---- */
.strat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: var(--sp-3);
}

.strat-header {
  padding: var(--sp-3) var(--sp-4);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  cursor: pointer;
  transition: background 0.15s;
}
.strat-header:hover {
  background: var(--bg-card-hover);
}

.strat-type {
  font-family: var(--font-heading);
  font-size: var(--text-md);
  font-weight: 700;
  white-space: nowrap;
}

.strat-name {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  flex: 1;
}

.strat-chevron {
  width: 20px;
  height: 20px;
  color: var(--text-muted);
  transform: rotate(0deg);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.strat-card.open .strat-chevron {
  transform: rotate(180deg);
}

.strat-body {
  display: none;
  padding: 0 var(--sp-4) var(--sp-4);
  border-top: 1px solid var(--border);
}
.strat-card.open .strat-body {
  display: block;
  padding-top: var(--sp-3);
}

.strat-row {
  display: flex;
  gap: var(--sp-2);
  padding: var(--sp-2) 0;
  border-bottom: 1px solid var(--border);
  font-size: var(--text-sm);
}
.strat-row:last-child { border-bottom: none; }

.strat-label {
  flex-shrink: 0;
  width: 120px;
  font-weight: 600;
  color: var(--text-secondary);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.03em;
  padding-top: 2px;
}

.strat-value {
  flex: 1;
  color: var(--text);
}

/* ---- Accordion (Surgical) ---- */
.accordion {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: var(--sp-3);
  background: var(--bg-card);
}

.accordion-header {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  cursor: pointer;
  font-family: var(--font-heading);
  font-weight: 600;
  font-size: var(--text-md);
  color: var(--text);
  transition: background 0.15s;
}
.accordion-header:hover {
  background: var(--bg-card-hover);
}

.accordion-chevron {
  width: 20px;
  height: 20px;
  color: var(--text-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
  margin-left: auto;
}
.accordion.open .accordion-chevron {
  transform: rotate(180deg);
}

.accordion-body {
  display: none;
  padding: 0 var(--sp-4) var(--sp-4);
  border-top: 1px solid var(--border);
}
.accordion.open .accordion-body {
  display: block;
  padding-top: var(--sp-3);
}

.surg-item {
  background: var(--bg-raised);
  border-radius: var(--radius-md);
  padding: var(--sp-3);
  margin-bottom: var(--sp-3);
}
.surg-item:last-child { margin-bottom: 0; }

.surg-diagnosis {
  font-weight: 700;
  font-size: var(--text-base);
  margin-bottom: var(--sp-2);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  flex-wrap: wrap;
}

.surg-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--sp-2);
}

@media (min-width: 640px) {
  .surg-grid {
    grid-template-columns: 1fr 1fr;
  }
}

.surg-col {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: var(--sp-2) var(--sp-3);
}

.surg-col-title {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: var(--sp-1);
  padding-bottom: var(--sp-1);
  border-bottom: 1px solid var(--border);
}

.surg-col .drug-item {
  font-size: var(--text-sm);
  padding: var(--sp-1) 0;
}

.op-type-badge {
  font-size: var(--text-xs);
  font-weight: 700;
  padding: 1px 8px;
  border-radius: 4px;
  text-transform: uppercase;
}
.op-type-plan {
  background: var(--severity-green-bg);
  color: var(--severity-green-text);
  border: 1px solid var(--severity-green-border);
}
.op-type-extr {
  background: var(--severity-red-bg);
  color: var(--severity-red-text);
  border: 1px solid var(--severity-red-border);
}
.op-type-repeat {
  background: var(--severity-yellow-bg);
  color: var(--severity-yellow-text);
  border: 1px solid var(--severity-yellow-border);
}

.surg-regime {
  font-size: var(--text-xs);
  color: var(--text-muted);
  margin-top: var(--sp-2);
  font-style: italic;
}

/* ---- Tab content ---- */
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Tab intro */
.tab-intro {
  margin-bottom: var(--sp-4);
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

/* ---- Search highlight ---- */
mark {
  background: var(--yellow-100);
  color: var(--gray-900);
  padding: 0 2px;
  border-radius: 2px;
}
[data-theme="dark"] mark {
  background: rgba(212,160,23,0.3);
  color: var(--text);
}

.no-results {
  text-align: center;
  padding: var(--sp-12) var(--sp-4);
  color: var(--text-muted);
}
.no-results-icon {
  font-size: 2rem;
  margin-bottom: var(--sp-3);
}

/* ---- Footer ---- */
.app-footer {
  border-top: 1px solid var(--border);
  padding: var(--sp-6) var(--sp-4);
  text-align: center;
  color: var(--text-muted);
  font-size: var(--text-xs);
}
.footer-inner {
  max-width: var(--max-width);
  margin: 0 auto;
}
.footer-note {
  margin-top: var(--sp-2);
  font-style: italic;
}
.footer-pplx {
  display: inline-block;
  margin-top: var(--sp-3);
  font-size: var(--text-xs);
  color: var(--text-muted);
  text-decoration: underline;
}
.footer-pplx:hover {
  color: var(--text-secondary);
}

/* ---- Responsive ---- */
@media (max-width: 480px) {
  .header-top { padding: var(--sp-2) var(--sp-3); }
  .tab-nav { padding: 0 var(--sp-3); }
  .app-main { padding: var(--sp-3); }
  .card { padding: var(--sp-3); }
  .strat-label { width: 90px; }
}

/* Pneumonia sub-tabs */
.pneumonia-subtabs {
  display: flex;
  gap: var(--sp-1);
  margin-bottom: var(--sp-4);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: var(--sp-1);
}
.pneumonia-subtabs::-webkit-scrollbar { display: none; }

.pneumonia-subtab {
  flex-shrink: 0;
  padding: var(--sp-1) var(--sp-3);
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: all 0.15s;
  white-space: nowrap;
}
.pneumonia-subtab:hover {
  border-color: var(--accent);
  color: var(--text);
}
.pneumonia-subtab.active {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--accent-text);
}

.pneumonia-section {
  display: none;
}
.pneumonia-section.active {
  display: block;
}

/* Hide all content in search mode, show matched */
.search-active .card[data-match="false"],
.search-active .strat-card[data-match="false"],
.search-active .accordion[data-match="false"],
.search-active .surg-item[data-match="false"] {
  display: none;
}

.search-active .tab-content {
  display: block !important;
}
.search-active .tab-content .tab-intro { display: none; }

.search-tab-title {
  font-family: var(--font-heading);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: var(--sp-4) 0 var(--sp-2);
  padding-bottom: var(--sp-2);
  border-bottom: 1px solid var(--border);
}
.search-tab-title:first-child { margin-top: 0; }

/* Stratification type badges used as references */
.type-ref {
  cursor: pointer;
  transition: transform 0.1s;
}
.type-ref:hover {
  transform: scale(1.05);
}
.type-ref:active {
  transform: scale(0.97);
}

// ---- RENDER FUNCTIONS ----

function renderDrugList(drugs) {
  return drugs.map(d => `<div class="drug-item">${drugHTML(d.n, d.d, d.r)}</div>`).join('');
}

function renderStratification() {
  let html = '<div class="tab-intro">Таблица 1 (Приложение 1). Стратификация госпитализированных пациентов с инфекцией по типам I–IV.</div>';
  stratData.forEach(s => {
    const colorMap = { green: 'badge-green', yellow: 'badge-yellow', orange: 'badge-orange', red: 'badge-red' };
    html += `<div class="strat-card" data-search-text="${searchText(JSON.stringify(s))}">
      <div class="strat-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="badge ${colorMap[s.color]} strat-type">${h(s.type)}</span>
        <span class="strat-name">${h(s.name)}</span>
        ${chevronSVG}
      </div>
      <div class="strat-body">
        ${s.rows.map(r => `<div class="strat-row">
          <div class="strat-label">${h(r[0])}</div>
          <div class="strat-value">${h(r[1]).replace(/\n/g,'<br>')}</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  return html;
}

function renderRegimen(data, tabTitle) {
  let html = `<div class="tab-intro">${tabTitle}</div>`;
  data.forEach(item => {
    html += `<div class="card severity-card ${item.severity}" data-search-text="${searchText(JSON.stringify(item))}">
      <div class="card-title">
        ${item.level ? `<span class="badge ${item.badge} type-ref" data-type="${item.level}" title="Стратификация">${h(item.level)}</span>` : ''}
        ${h(item.title)}
      </div>`;
    item.groups.forEach(g => {
      html += `<div class="card-section">
        <div class="card-section-title">${h(g.name)}</div>
        ${renderDrugList(g.drugs)}
      </div>`;
    });
    if (item.mrsa) html += mrsaCallout;
    if (item.candida) html += candidaCallout;
    html += `</div>`;
  });
  return html;
}

function renderSkin() {
  let html = '<div class="tab-intro">Таблица 6. Стартовый режим при инфекции кожи и мягких тканей (в т.ч. катетер-ассоциированной).</div>';
  skinData.forEach(item => {
    html += `<div class="card severity-card ${item.severity}" data-search-text="${searchText(JSON.stringify(item))}">
      <div class="card-title">${h(item.title)}</div>`;
    item.groups.forEach(g => {
      html += `<div class="card-section">
        <div class="card-section-title">${h(g.name)}</div>
        ${renderDrugList(g.drugs)}
      </div>`;
    });
    html += `</div>`;
  });
  // MRSA callout
  html += mrsaCallout;
  // Severe
  html += `<div class="card severity-card severity-red" data-search-text="карбапенем имипенем меропенем тяжёлая">
    <div class="card-title"><span class="badge badge-red">Тяжёлое течение</span> Карбапенем II группы</div>
    <div class="card-section">${renderDrugList([
      { n: 'Имипенем/циластатин', d: '1г 3-4р/сут', r: 'в/в' },
      { n: 'Меропенем', d: '1-2г 3-4р/сут (3-час. инфузия)', r: 'в/в' },
    ])}</div>
  </div>`;
  html += candidaCallout;
  return html;
}

  let html = '<div class="tab-intro">Таблица 7. Эмпирический выбор при инфекционном эндокардите.</div>';

    <div class="card-title">Основной режим</div>
    <div class="card-section">${renderDrugList(d.basic)}</div>

  html += `<div class="card severity-card severity-red" data-search-text="${searchText(JSON.stringify(d.severe))}">
    <div class="card-title"><span class="badge badge-red">Тяжёлое</span> Карбапенем II группы</div>
    <div class="card-section">${renderDrugList(d.severe)}</div>
  </div>`;
  html += candidaCallout;
  html += `<div class="callout callout-info">
    ${warnSVG}
    <div><strong>Примечания:</strong><br>${d.notes.map(n => `• ${h(n)}`).join('<br>')}</div>
  </div>`;
  return html;
}

function renderPneumonia() {
  const pd = pneumoniaData;
  const sections = [
    { id: 'vp', label: 'Внебольничная', keys: ['vp_light', 'vp_comorbid'] },
    { id: 'severe', label: 'Тяжёлая (ОРИТ)', keys: ['severe_norisk', 'severe_pseudo', 'severe_acin', 'severe_mrsa'] },
    { id: 'noso', label: 'Нозокомиальная', keys: ['noso_early', 'noso_late'] },
    { id: 'covid', label: 'COVID-19', keys: ['covid_preg', 'covid_risk', 'covid_pseudo'] },
    { id: 'fungal', label: 'Грибковые', keys: ['fungal'] },
  ];

  let html = '<div class="tab-intro">Таблицы 5 + Приложение 2. Все режимы при пневмонии.</div>';
  html += '<div class="pneumonia-subtabs">';
  sections.forEach((s, i) => {
    html += `<button class="pneumonia-subtab${i === 0 ? ' active' : ''}" data-psection="${s.id}">${s.label}</button>`;
  });
  html += '</div>';

  sections.forEach((sec, si) => {
    html += `<div class="pneumonia-section${si === 0 ? ' active' : ''}" data-psection="${sec.id}">`;
    sec.keys.forEach(key => {
      const item = pd[key];
      if (!item) return;
      const sev = key.includes('severe') || key.includes('noso_late') || key.includes('covid_pseudo') ? 'severity-red' :
                   key.includes('comorbid') || key.includes('noso') || key.includes('covid') ? 'severity-yellow' : 'severity-green';
      html += `<div class="card severity-card ${sev}" data-search-text="${searchText(JSON.stringify(item))}">
        <div class="card-title">${h(item.title)}</div>`;
      if (item.subtitle) html += `<p style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:var(--sp-2)">${h(item.subtitle)}</p>`;
      if (item.main) {
        html += `<div class="card-section"><div class="card-section-title">Основные</div>${renderDrugList(item.main)}</div>`;
      }
      if (item.alt) {
        html += `<div class="card-section"><div class="card-section-title">Альтернативные</div>${renderDrugList(item.alt)}</div>`;
      }
      if (item.extra) {
        html += `<div class="card-section"><div class="card-section-title">${h(item.extra.name)}</div>${renderDrugList(item.extra.drugs)}</div>`;
      }
      if (item.note) {
        html += `<div class="callout callout-info">${warnSVG}<div>${h(item.note)}</div></div>`;
      }
      if (item.mrsa) html += mrsaCallout;
      html += `</div>`;
    });
    html += '</div>';
  });

  return html;
}

function renderSurgical() {
  let html = '<div class="tab-intro">Приложение 3. Формуляр по антибиотикопрофилактике и эмпирической терапии в хирургических отделениях.</div>';
  surgicalData.forEach(sec => {
    html += `<div class="accordion" data-search-text="${searchText(JSON.stringify(sec))}">
      <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">
        ${h(sec.section)}
        ${chevronAccSVG}
      </div>
      <div class="accordion-body">`;
    sec.items.forEach(item => {
      const opClass = item.opType === 'План' ? 'op-type-plan' :
                       item.opType === 'Повтор' ? 'op-type-repeat' : 'op-type-extr';
      html += `<div class="surg-item" data-search-text="${searchText(JSON.stringify(item))}">
        <div class="surg-diagnosis">
          ${h(item.diagnosis)}
          <span class="op-type-badge ${opClass}">${h(item.opType)}</span>
        </div>
        <div class="surg-grid">`;

      if (item.prophylaxis) {
        html += `<div class="surg-col">
          <div class="surg-col-title">Профилактика (основные)</div>
          ${renderDrugList(item.prophylaxis)}
        </div>`;
      }
      if (item.altProphylaxis) {
        html += `<div class="surg-col">
          <div class="surg-col-title">Альтернативные (аллергия на β-лактамы)</div>
          ${renderDrugList(item.altProphylaxis)}
        </div>`;
      }
      if (item.empirical) {
        html += `<div class="surg-col">
          <div class="surg-col-title">Эмпирическая терапия</div>
          ${renderDrugList(item.empirical)}
        </div>`;
      }
      if (item.altEmpirical) {
        html += `<div class="surg-col">
          <div class="surg-col-title">Эмпирическая (альтернативная)</div>
          ${renderDrugList(item.altEmpirical)}
        </div>`;
      }

      html += `</div>`;

      if (item.mrsaNote) {
        html += `<div class="callout callout-mrsa" style="margin-top:var(--sp-2)">
          ${warnSVG}<div><strong>MRSA:</strong> ${h(item.mrsaNote)}</div>
        </div>`;
      }
      if (item.note) {
        html += `<div class="callout callout-info" style="margin-top:var(--sp-2)">
          ${warnSVG}<div>${h(item.note)}</div>
        </div>`;
      }
      if (item.regime) {
        html += `<div class="surg-regime">Режим: ${h(item.regime)}</div>`;
      }

      html += `</div>`;
    });
    html += `</div></div>`;
  });
  return html;
}

function searchText(str) {
  return str.toLowerCase().replace(/[{}"\\[\]:,]/g, ' ');
}

// ---- INIT ----
const main = $('#appMain');
const tabs = {
  stratification: renderStratification,
  sepsis: () => renderRegimen(sepsisData, 'Таблица 2. Стартовый эмпирический режим при сепсисе.'),
  abdominal: () => renderRegimen(abdominalData, 'Таблица 3. Стартовый режим при абдоминальной инфекции (в т.ч. деструктивный панкреатит, инфекция малого таза).'),
  uti: () => renderRegimen(utiData, 'Таблица 4. Стартовый режим при инфекции мочевыводящих путей.'),
  pneumonia: renderPneumonia,
  skin: renderSkin,
  endocarditis: renderEndocarditis,
  surgical: renderSurgical,
};

let currentTab = 'stratification';
const tabContents = {};

// Pre-render all tabs
Object.keys(tabs).forEach(key => {
  const div = document.createElement('div');
  div.className = 'tab-content';
  div.id = `tab-${key}`;
  div.innerHTML = tabs[key]();
  main.appendChild(div);
  tabContents[key] = div;
});

function switchTab(tabId) {
  currentTab = tabId;
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  Object.keys(tabContents).forEach(k => tabContents[k].classList.toggle('active', k === tabId));
  // Scroll active tab button into view
  const activeBtn = $(`.tab-btn[data-tab="${tabId}"]`);
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

switchTab('stratification');

// Tab click
$$('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// Pneumonia subtabs
document.addEventListener('click', e => {
  const sub = e.target.closest('.pneumonia-subtab');
  if (!sub) return;
  const id = sub.dataset.psection;
  $$('.pneumonia-subtab').forEach(b => b.classList.toggle('active', b.dataset.psection === id));
  $$('.pneumonia-section').forEach(s => s.classList.toggle('active', s.dataset.psection === id));
});

// Stratification type ref clicks
document.addEventListener('click', e => {
  const ref = e.target.closest('.type-ref');
  if (!ref) return;
  switchTab('stratification');
  setTimeout(() => {
    const cards = $$('.strat-card');
    const type = ref.dataset.type;
    cards.forEach(c => {
      const badge = c.querySelector('.strat-type');
      if (badge && badge.textContent.includes(type.replace('Тип ',''))) {
        c.classList.add('open');
        c.scrollIntoView({ behavior: 'smooth', block: 'center' });
        c.style.boxShadow = '0 0 0 2px var(--accent)';
        setTimeout(() => c.style.boxShadow = '', 2000);
      }
    });
  }, 100);
});

// ---- SEARCH ----
const searchToggle = $('#searchToggle');
const searchBar = $('#searchBar');
const searchInput = $('#searchInput');
const searchClear = $('#searchClear');

searchToggle.addEventListener('click', () => {
  searchBar.classList.toggle('open');
  if (searchBar.classList.contains('open')) {
    searchInput.focus();
  } else {
    searchInput.value = '';
    clearSearch();
  }
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  clearSearch();
});

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) {
    clearSearch();
    return;
  }
  performSearch(q);
});

function clearSearch() {
  main.classList.remove('search-active');
  // Restore tab visibility
  Object.keys(tabContents).forEach(k => tabContents[k].classList.toggle('active', k === currentTab));
  // Remove all marks
  $$('mark', main).forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });
  // Reset match attrs
  $$('[data-match]', main).forEach(el => el.removeAttribute('data-match'));
  // Remove search tab titles
  $$('.search-tab-title', main).forEach(el => el.remove());
}

function performSearch(query) {
  clearSearch();
  main.classList.add('search-active');

  // Show all tabs
  Object.values(tabContents).forEach(tc => tc.classList.add('active'));

  const tabNames = {
    stratification: 'Стратификация',
    sepsis: 'Сепсис',
    abdominal: 'Абдоминальная',
    uti: 'МВП',
    pneumonia: 'Пневмония',
    skin: 'Кожа и мягкие ткани',
    endocarditis: 'Эндокардит',
    surgical: 'Хирургическая профилактика',
  };

  let anyMatch = false;

  Object.keys(tabContents).forEach(tabKey => {
    const tc = tabContents[tabKey];
    let tabHasMatch = false;
    const searchables = $$('[data-search-text]', tc);
    searchables.forEach(el => {
      const text = el.getAttribute('data-search-text') || '';
      if (text.includes(query)) {
        el.setAttribute('data-match', 'true');
        tabHasMatch = true;
        anyMatch = true;
      } else {
        el.setAttribute('data-match', 'false');
      }
    });

    // For tabs without searchables (callouts etc.), check full text
    if (!searchables.length) {
      if (tc.textContent.toLowerCase().includes(query)) {
        tabHasMatch = true;
        anyMatch = true;
      }
    }

    if (tabHasMatch) {
      // Insert tab title before first match
      const existing = tc.querySelector('.search-tab-title');
      if (!existing) {
        const title = document.createElement('div');
        title.className = 'search-tab-title';
        title.textContent = tabNames[tabKey];
        tc.insertBefore(title, tc.firstChild);
      }
    }
  });

  // Open matched accordions and strat cards
  $$('.accordion[data-match="true"]', main).forEach(a => a.classList.add('open'));
  $$('.strat-card[data-match="true"]', main).forEach(a => a.classList.add('open'));

  if (!anyMatch) {
    // Show no results
    const noRes = document.createElement('div');
    noRes.className = 'no-results search-tab-title';
    noRes.innerHTML = `<div class="no-results-icon">🔍</div>Ничего не найдено по запросу «${h(query)}»`;
    main.insertBefore(noRes, main.firstChild);
  }
}

// ---- DARK MODE ----
const themeToggle = $('#themeToggle');
let currentTheme = 'light';
try {
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    currentTheme = 'dark';
    document.documentElement.setAttribute('data-theme', 'dark');
  }
} catch(e) {}

themeToggle.addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
});

// Open first strat card by default
setTimeout(() => {
  const first = $('.strat-card');
  if (first) first.classList.add('open');
}, 100);
</script>
